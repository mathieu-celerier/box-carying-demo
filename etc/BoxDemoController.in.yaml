---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: true
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: false
# Where to look for state libraries
StatesLibraries:
  - "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
  - "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
# Where to look for state files
StatesFiles:
  - "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
  - "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
# If true, state factory will be more verbose
VerboseStateFactory: false
# Additional robots to load
robots:
  ground:
    module: env/ground
# General constraints, always on
# constraints:
#   - type: contact
#   - type: dynamics
#     damper: [0.1, 0.01, 0.5]
#   - type: compoundJoint
# Collision constraint
collisions:
  - type: collision
    useMinimal: true
# Initial set of contacts
# contacts:
# - r1: jvrc1
#   r2: ground
#   r1Surface: LeftFoot
#   r2Surface: AllGround
# - r1: jvrc1
#   r2: ground
#   r1Surface: RightFoot
#   r2Surface: AllGround

# Some options for a specific robot
# jvrc1:
#   posture:
#     stiffness: 1
#     weight: 10
#   ff:
#     stiffness: 2
#     weight: 100
# Implement some additional text states
states:
  BoxDemoController_Compliance:
    residualGain: 10.0
    xyComplianceOnThreshold: 10.0
    xyComplianceOffThreshold: 8
    dFZComplianceOnThreshold: 10.0
    dFZComplianceOffThreshold: 8
    rotationYComplianceOnThreshold: 10.0
    rotationYComplianceOffThreshold: 8.0
    rotationYComplianceXThreshold: 0.3
    complianceGain: 1.0
    nominalPositionStiffness: 60.0
    nominalPositionDamping: 40.0
    compliantPositionStiffness: 0.0
    compliantPositionDamping: [40.0, 30.0, 30.0]
    nominalOrientationStiffness: [60.0, 60.0, 60.0]
    nominalOrientationDamping: [20.0, 20.0, 30.0]
    compliantOrientationStiffness: [60.0, 60.0, 0.0]
    compliantOrientationDamping: [20.0, 20.0, 30.0]
    xyForceCompliantOrientationStiffness: [60.0, 60.0, 0.0]
    xyForceCompliantOrientationDamping: [20.0, 20.0, 30.0]
    rotationYCompliantOrientationStiffness: [60.0, 0.0, 60.0]
    rotationYCompliantOrientationDamping: [20.0, 30.0, 20.0]
    gainTransitionTime: 0.3

# Transitions map
transitions:
  - [BoxDemoController_Initial, OK, BoxDemoController_Compliance, Strict]
  - [BoxDemoController_Compliance, OK, BoxDemoController_Initial, Strict]
# Initial state
init: BoxDemoController_Initial

Plugins: [ExternalForcesEstimator]

kinova_bota_ds4:
  tool_frame: "FT_sensor_wrench"

ObserverPipelines:
  - name: Pipeline
    observers:
      - type: Encoder
        config:
          velocity: encoderVelocities

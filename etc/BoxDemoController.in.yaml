---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: true
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: false
# Where to look for state libraries
StatesLibraries:
  - "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
  - "@STATES_INSTALL_PREFIX@/@PROJECT_NAME@/states"
# Where to look for state files
StatesFiles:
  - "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
  - "@STATES_INSTALL_PREFIX@/@PROJECT_NAME@/states/data"
# If true, state factory will be more verbose
VerboseStateFactory: false
# Additional robots to load
robots:
  ground:
    module: env/ground
# General constraints, always on
# constraints:
#   - type: contact
#   - type: dynamics
#     damper: [0.1, 0.01, 0.5]
#   - type: compoundJoint
# Collision constraint
collisions:
  - type: collision
    useMinimal: true
# Initial set of contacts
# contacts:
# - r1: jvrc1
#   r2: ground
#   r1Surface: LeftFoot
#   r2Surface: AllGround
# - r1: jvrc1
#   r2: ground
#   r1Surface: RightFoot
#   r2Surface: AllGround

# Some options for a specific robot
# jvrc1:
#   posture:
#     stiffness: 1
#     weight: 10
#   ff:
#     stiffness: 2
#     weight: 100
# Implement some additional text states
states:
  Compliance:
    base: BoxDemoController_Compliance
    toolFrame: "tool"
    postureHome:
      joint_1: [0]
      joint_2: [0.262]
      joint_3: [3.14]
      joint_4: [-2.269]
      joint_5: [0]
      joint_6: [0.96]
      joint_7: [1.57]
    targetPosition: [0.6, 0.0, 0.4]
    targetOrientationQuaternion: [1.0, -1.0, -1.0, -1.0]
    workspaceConstraintEnabled: true
    workspaceMin: [0.4, -0.8, -0.2]
    workspaceMax: [1.0, 0.8, 0.7]
    residualGain: 10.0
    planarTranslationTriggerOnThreshold: 10.0
    planarTranslationTriggerOffThreshold: 8.0
    rotationZTriggerOnThreshold: 1.5
    rotationZTriggerOffThreshold: 1.0
    dFZComplianceOnThreshold: 10.0
    dFZComplianceOffThreshold: 8.0
    triggerAveragingWindow: 0.1
    complianceGain: 1.0
    nominalPositionStiffness: 100.0
    nominalPositionDamping: 40.0
    planarTranslationStiffness: 0.0
    planarTranslationDamping: [20.0, 20.0, 30.0]
    nominalOrientationStiffness: [100.0, 100.0, 100.0]
    nominalOrientationDamping: [40.0, 40.0, 40.0]
    exclusiveComplianceModes: false
    orientationManagementMode: "Compliance"
    rotationZOrientationStiffness: 0.0
    rotationZOrientationDamping: 20.0
    worldZTorqueToLocalYGain: 0.1
    maxLocalYOrientationOffset: 1.2
    gainTransitionTime: 0.4

# Transitions map
transitions:
  - [BoxDemoController_Initial, OK, Compliance, Auto]
  - [Compliance, OK, BoxDemoController_Initial, Auto]
# Initial state
init: BoxDemoController_Initial

Plugins: [ExternalForcesEstimator]

kinova_bota_ds4:
  tool_frame: "FT_sensor_wrench"

ObserverPipelines:
  - name: Pipeline
    observers:
      - type: Encoder
        config:
          velocity: encoderVelocities
